services:
  # Backend Web Service
  - type: web
    name: mapup-backend
    runtime: docker
    rootDir: backend
    repo: https://github.com/deadheaven07/Assignment_MapUp_
    plan: free
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: mapup-postgres
          property: connectionString
      - key: CORS_ORIGINS
        value: https://assignment-map-up.vercel.app

databases:
  # PostgreSQL Database
  - name: mapup-postgres
    plan: free
    databaseName: mapup_db
    user: deadheaven07